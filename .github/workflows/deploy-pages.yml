name: Deploy example to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'example/**'
      - 'pubspec.yaml'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy in flight at a time; never cancel one that's already
# uploading so Pages doesn't end up serving a half-published build.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Flutter web
        run: flutter config --enable-web

      - name: Install example dependencies
        working-directory: example
        run: flutter pub get

      - name: Build example for web
        working-directory: example
        # This repo is served from https://<user>.github.io/driver.js/, a
        # project (not user/org) Pages site, so every asset URL needs the
        # repo name as its base path — otherwise index.html loads fine but
        # every subsequent asset 404s.
        run: flutter build web --release --base-href /driver.js/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: example/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
